                padding: 12px 20px;

	            margin-left: auto;
                display: block;

            color: green;

        }

            border: none;
            height: 2px;
            margin: 40px auto;
            width: 80%;
            background: linear-gradient(to right, #00ff00, #000, #00ff00);
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
        }
        .fixture-box {
            background-color: #000;
            border: 2px solid #00ff00;
            border-radius: 10px;
            padding: 15px 25px;
            margin: 10px auto 20px auto;
            width: fit-content;
            max-width: 600px;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.3);
            text-align: left;
        }
        .fixture-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .fixture-list li {
            padding: 8px 0;
            border-bottom: 1px solid #00ff00;
            color: #00ff00;
            font-weight: bold;
            font-size: 16px;
        }
        .fixture-list li:last-child {
            border-bottom: none;
        }
        .table-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }
        table {
            width: 90%;
            max-width: 500px;
            border-collapse: collapse;
            background-color: #f8f8f8;
            color: #000;
            border: 2px solid #00ff00;
            font-size: 16px;
        }
        table th, table td {
            border: 1px solid #00ff00;
            padding: 10px;
            text-align: center;
        }
        table thead {
            background-color: #000;
            color: #00ff00;

        tbody tr:hover {

        .olympics-winner {
            font-family: 'Arial Black', sans-serif;

            0% { box-shadow: 0 0 15px rgba(0, 255, 0, 0.4); }
